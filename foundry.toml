[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
broadcast = "broadcast"
solc_version = "0.8.20"

# 編譯器優化設定
optimizer = true
optimizer_runs = 200

# 測試設定
fuzz_runs = 1000

# CI 環境專用設定
[profile.ci]
fuzz_runs = 10000

# RPC URLs（可選，用於部署）
[rpc_endpoints]
base_sepolia = "https://sepolia.base.org"
base_mainnet = "https://mainnet.base.org"
localhost = "http://127.0.0.1:8545"

# 格式化設定
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"